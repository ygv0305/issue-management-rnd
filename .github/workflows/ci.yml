name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - name: backend
            working-directory: backend
            lockfile: backend/package-lock.json
          - name: frontend
            working-directory: frontend
            lockfile: frontend/package-lock.json

    name: ${{ matrix.project.name }}

    defaults:
      run:
        working-directory: ${{ matrix.project.working-directory }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.project.lockfile }}

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build
