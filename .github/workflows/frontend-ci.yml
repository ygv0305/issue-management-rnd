name: Frontend CI

on:
  push:
    branches:
      - TharjekanTest
    paths:
      - 'frontend/**'
  pull_request:
    branches:
      - TharjekanTest
    paths:
      - 'frontend/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install
      working-directory: frontend

    - name: Run linter
      run: npm run lint
      working-directory: frontend

    - name: Build project
      run: npm run build
      working-directory: frontend